- authors:
  - Singson, Lea Sophie
  - "Bo\xDFe, Sophie"
  description: 'Im Rahmen der Legal Training Series &bdquo;Don&rsquo;t panic! Survival
    guide for Law and Ethics in Research&rdquo;, organisiert von FAIRagro, NFDI4Biodiversity
    und NFDI4Earth, wurde vom 08. &ndash; 10.04.25 die erste Episode, Datenschutz
    auf dem Silbertablett, von Lea Singson und Sophie Bo&szlig;e durchgef&uuml;hrt:

    &bdquo;Du sammelst Proben auf landwirtschaftlich genutzten Fl&auml;chen, du nutzt
    Drohnenaufnahmen, auf denen auch Menschen zu sehen sind, du nimmst im Park Vogelstimmen
    auf und erwischt dabei ein paar Gespr&auml;che&nbsp; oder du m&ouml;chtest Interviews
    mit Landwirt*innen oder Anwohnenden f&uuml;hren. Dabei ist eins klar: Wo Menschen
    sind, ist die Datenschutzgrundverordnung (DSGVO) nicht weit!

    Doch was will die DSGVO eigentlich und was hat das mit Dir zu tun? Musst Du datenschutzrechtliche
    Aspekte &uuml;berhaupt beachten? In dieser Einheit arbeiten wir gemeinsam durch
    die praktisch relevanten Aspekte des Themas Datenschutz!&nbsp; Wir kl&auml;ren
    was die DSGVO ist, f&uuml;r welche Art der Daten sie anwendbar ist und was in
    diesem Fall getan werden muss. Dabei unterst&uuml;tzen wir dich unter anderem
    dabei zu lernen, informierte Einwilligungen, bzw. Datenschutzerkl&auml;rungen
    zu verfassen, die auch verst&auml;ndlich sind. Wir zeigen, wie du datenschutzrechtlich
    relevante Datenverarbeitungen beurteilen und begr&uuml;nden kannst und diskutieren,
    wie Forschungsdaten gerettet werden k&ouml;nnen, wenn die eingeholte Einwilligung
    widerrufen wird.&ldquo;

    An dieser Stelle werden sowohl die Aufzeichnungen der nicht interaktiven Teile
    der Online-Workshops als auch alle verwendeten Trainingsmaterialien zur Verf&uuml;gung
    gestellt. Zielgruppe dieser Ver&ouml;ffentlichung sind sowohl Personen, die eigenst&auml;ndig
    Inhalte zum Thema Datenschutz erlernen m&ouml;chten, als auch Trainer:innen, die
    Konzept und Materialien der Workshops vollst&auml;ndig oder teilweise nachnutzen
    m&ouml;chten. Das Lehrdrehbuch hilft bei der Konzeption von Veranstaltung und
    gibt einen &Uuml;berblick &uuml;ber Themen, Lernziele und Zeitplanung des Workshops.
    Dar&uuml;ber hinaus sind Pr&auml;sentationsfolien inklusive Vortragsnotizen, Arbeitsbl&auml;tter
    und zentrale Linksdokumente, die mit den Teilnehmenden in Online-Workshops geteilt
    werden k&ouml;nnen verf&uuml;gbar, die zur Nachnutzung angepasst werden k&ouml;nnen
    und sollten.

    Alle Materialien sind f&uuml;r optimale Nachnutzbarkeit in verschiedenen Formaten
    verf&uuml;gbar.

    &nbsp;

