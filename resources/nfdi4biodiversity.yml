  - "Gr\xFCnberger, Tom"
  description: 'Das wissenschaftliche Gutachten untersucht die rechtlichen und ethischen
    Rahmenbedingungen f&uuml;r die Ver&ouml;ffentlichung und Nachnutzung von Artvorkommensdaten
    am Beispiel des GfI-Fischartenatlas. Das Gutachten wurde beauftragt, um die Befugnisse
    der Betreiber zur Weitergabe der &uuml;ber Jahre gesammelten Daten an die Global
    Biodiversity Information Facility (GBIF) zu kl&auml;ren. Der GfI-Fischartenatlas,
    eine Zusammenarbeit zwischen der Gesellschaft f&uuml;r Ichthyologie e.V. und der
    Hochschule Bremen, umfasst &uuml;ber 120.000 Datens&auml;tze zu Fischarten, die
    durch verschiedene Methoden und mit Unterst&uuml;tzung von Ehrenamtlichen und
    Studierenden gesammelt wurden.

    Das Gutachten f&uuml;hrt in verschiedene Gebiete ein, die f&uuml;r die Entscheidung
    ma&szlig;geblich sind: Urheberrecht, Rechte an Datenbanken, Datenschutz, Forschungsethik
    und Lizenzierung. Jeweils am Beispiel des Fischartenatlas wird erl&auml;utert,
    wie es um die Befugnisse zur Nachnutzung bestellt ist und welche Vorkehrungen
    zur Weitergabe der Artvorkommensdaten getroffen werden sollten.

    In der Zusammenschau steht der Weitergabe des Datenschatzes an GBIF wenig im Wege.
    Vorsorglich sollte jedoch die Zustimmung der freiwilligen Fundmelder:innen eingeholt
    werden, ggf. auch zu einer anonymisierten Weitergabe, und die Nutzungs- sowie
    Datenschutzbestimmungen auf der Webseite des GfI-Fischartenatlas entsprechend
    angepasst werden.'
