  description: 'English:

    Small mistakes can have serious consequences. You can lose a day or a decade of
    work or your data may be lost forever. With our selection of scientific horror
    stories, we illustrate common and sometimes fatal mistakes in research data management
    &ndash; and how they may have been prevented. In this, we follow the fine example
    of the Thuringian Competence Network for Research Data Management (TKFDM), who
    compiled a wonderful collection of&nbsp;Research Data Scary Tales. However, working
    with biodiversity data comes with some particular pitfalls. So join us in being
    creeped out with us by common mishaps and malicious hidden agendas... Can you
    guess what went wrong?

    All of our stories are available in the NFDI4Biodiversity Knowledge Base &ndash;
    consisting of the puzzle phrase, illustration, solution, suggestions for better
    research data management, and sources.

    The texts published here may be used under the license CC0.

    --

    Deutsch:


    Kleine Fehler k&ouml;nnen gro&szlig;e Folgen haben. Mal war ein Tag Arbeit umsonst,
    mal ein Jahrzehnt, und manchmal sind Daten unwiederbringlich verloren. Wir zeigen
    mit ausgew&auml;hlten wissenschaftlichen Schauergeschichten h&auml;ufige und manchmal
    fatale Fehler beim Forschungsdatenmanagement &ndash; und wie sie vielleicht h&auml;tten
    vermieden werden k&ouml;nnen. Unser Vorbild ist dabei das Th&uuml;ringer Kompetenznetzwerk
    Forschungsdatenmanagement (TKFDM), das eine wunderbare Sammlung von Research Data
    Scary Tales zusammengestellt hat. Die Arbeit mit Biodiversit&auml;tsdaten hat
    jedoch einige spezielle T&uuml;cken &ndash; und so laden wir Sie dazu ein, sich
    mit uns zusammen zu gruseln. K&ouml;nnen Sie erraten, was hier nicht nach Plan
    verlief?

    In der NFDI4Biodiversity Knowledge Base finden Sie alle unsere Geschichten &ndash;
    bestehend aus R&auml;tsel, Illustration, Aufl&ouml;sung, Hinweisen zu besserem
    Datenmanagement, und den jeweiligen Quellen.

    Die hier ver&ouml;ffentlichten Texte k&ouml;nnen unter der Lizenz CC0 genutzt
    werden.

    '
