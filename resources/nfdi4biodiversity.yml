  description: 'EN


    As part of the NFDI4Biodiversity All Hands Conference, October 12-14, 2022, Use
    Case 19 provided an overview of geovisualization approaches in the poster session.
    In Use Case 19, the goal is to make datasets comprehensible. Spatial visualizations
    are used to present complex information about biodiversity data in an understandable
    and transparent way. The work focused on interrogating, analyzing, and linking
    datasets to reveal new relationships. Special attention is given to addressing
    different user groups, the quality of the data, and the visualization of uncertainties.
    The Data Story format offers the possibility to combine different data sets and
    thus to convey complex information in a clear way.


    DE


    Im Rahmen der NFDI4Biodiversity All Hands Conference die vom 12. Bis 14. Oktober
    2022 stattgefunden hat, gab der Use Case 19 in der Poster Session einen &Uuml;berblick
    &uuml;ber die ausgearbeiteten Ans&auml;tze der Geovisualisierung. Im Use Case
    19 wird das Ziel verfolgt, Datens&auml;tze begreifbar zu machen. Durch raumbezogene
    Visualisierungen sollen komplexe Informationen &uuml;ber Biodiversit&auml;tsdaten
    verst&auml;ndlich und transparent dargestellt werden. Die Arbeit konzentrierte
    sich auf das Befragen, Analysieren und Verkn&uuml;pfen von Datens&auml;tzen, um
    neue Zusammenh&auml;nge zu enth&uuml;llen. Besonderes Augenmerk liegt dabei auf
    der Adressierung verschiedener Nutzergruppen, der Qualit&auml;t der Daten und
    der Visualisierung von Unsicherheiten. Das Format Data Story bietet hierbei die
    M&ouml;glichkeit, verschiedene Datens&auml;tze zu kombinieren und so komplexe
    Informationen anschaulich zu vermitteln.'
