  description: "Wir ben&ouml;tigen dringend mehr und bessere Daten um im Angesicht\
    \ der Biodiversit&auml;tskrise bessere Vorhersagen treffen und Handlungsoptionen\
    \ erarbeiten zu k&ouml;nnen (IPBES 2019). Dabei werden bereits gro&szlig;e Summen\
    \ in die Biodiversit&auml;tsforschung gesteckt &ndash; aber die so gewonnenen\
    \ Daten sind bisher oft nur schlecht nachnutzbar. Eine Aufgabe von NFDI4Biodiversity\
    \ ist es, das Management von Forschungsdaten zu verbessern, und so mehr und vielf&auml;ltigere\
    \ Daten nutzbar zu machen.\nUm den Umgang mit Forschungsdaten einzu&uuml;ben,\
    \ ben&ouml;tigen wir u.a. auch Trainingsdatens&auml;tze, mit denen Forschungsdatenmanagement\
    \ (FDM) einge&uuml;bt werden kann, und die als Vorlagen f&uuml;r die eigenen Daten\
    \ dienen &ndash; sei es, um eigene Daten entsprechend eines bestimmten Metadatenstandards\
    \ zu ver&ouml;ffentlichen, um bestimmte Softwaretools benutzen oder um die eigenen\
    \ Daten m&ouml;glichst gut mit anderen Daten verkn&uuml;pfen zu k&ouml;nnen.\n\
    Im Bereich Biodiversit&auml;tsforschung, &Ouml;kologie und Umweltwissenschaften\
    \ hat der Begriff &bdquo;Trainingsdatensatz&ldquo; verschiedene Bedeutungen: K&uuml;nstliche\
    \ Intelligenz wird mit Trainingsdatens&auml;tzen auf Mustererkennung trainiert\
    \ (z.B. f&uuml;r die automatische Identifikation von Pflanzen), Datens&auml;tze\
    \ werden zur Sch&auml;tzung von Parametern f&uuml;r statistische und andere Modelle\
    \ in Trainings- und Testdaten geteilt, in der Lehre werden Trainingsdatens&auml;tze\
    \ zur Vermittlung von fachlichen Inhalten genutzt, und schlie&szlig;lich vermitteln\
    \ Trainingsdatens&auml;tze Aspekte des Forschungsdatenmanagements. \nForschungsdatenmanagement\
    \ ist Teil der Guten Wissenschaftlichen Praxis (DFG Kodex 2022), deshalb werden\
    \ in der Lehre meist fachliche und formelle Inhalte gleichzeitig vermittelt. Allerdings\
    \ gibt es bisher z.B. mehr Trainingsdatens&auml;tze die bestimmte statistische\
    \ Analysemethoden vermitteln als solche die dabei helfen das Ver&ouml;ffentlichen\
    \ eigener Daten oder andere Aspekte des Forschungsdatenmanagements zu &uuml;ben.\n\
    Im Rahmen der NFDI4Biodiversity All Hands Conference im Mai 2024 in M&uuml;nchen\
    \ organisierten wir deshalb einen Workshop zum Thema &bdquo;Trainingsdatens&auml;tze\
    \ und FDM-Materialien&ldquo;. Dort sammelten wir gemeinsam Kriterien f&uuml;r\
    \ gute Trainingsdatens&auml;tze, charakterisierten einige von uns bereits in FDM-Kontexten\
    \ verwendeten Trainingsdatens&auml;tze entsprechend Struktur, Inhalt, Herkunft,\
    \ und Grad der Aufbereitung, und ordneten diese Trainingsdatens&auml;tze Stationen\
    \ des Datenlebenszyklus zu. Hier berichten wir die Ergebnisse dieses Workshops.\n\
    Weitere Informationen auf der NFDI4Biodiversity-Webseite.&nbsp;"
