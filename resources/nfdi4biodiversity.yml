  description: 'Abstract:

    The Leibniz Institute for Baltic Sea Research Warnem&uuml;nde (IOW) maintains
    one of the longest continuous data series of marine observations, which began
    in the 1950s. Over the decades, the integration of evolving technologies and methodologies
    has played a crucial role in expanding the institute&rsquo;s research capabilities.
    Since the turn of the millennium, the technological progress has accelerated exponentially,
    creating new opportunities for modern marine research. At the same time, climate
    change and other anthropogenic influences pose new challenges from which further
    research tasks arise. Addressing these challenges requires advances across several
    domains, including measurement technologies &amp; instrumentation, modeling, bioinformatics
    and research data management.

    The IOW is committed to evolving its data management infrastructure in line with
    modern best practices, including the FAIR data principles and following community
    standards for data and metadata. One key element of this approach is IOW&rsquo;s
    new database framework "MetaTransfer". It is designed to connect metadata of the
    often heterogeneous data outputs from the various marine scientific disciplines
    by enriching the metadata with information about related datasets and the research
    environment. Moreover, it aims to simplify the metadata collection process for
    data creators. The poster presentation provides details on how this framework
