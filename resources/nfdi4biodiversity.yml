  description: "Table 1\nTitle: Neodymium isotope compositions of Fe&ndash;Mn oxyhydroxide\
    \ leachates from ODP Site 982, North Atlantic\nAbstract: Neodymium isotope compositions\
    \ (143Nd/144Nd, &epsilon;Nd) were measured on Fe&ndash;Mn oxyhydroxide leachates\
    \ extracted from bulk sediments at ODP Site 982 (Rockall Plateau, North Atlantic;\
    \ 57&deg;30.992N, 15&deg;52.001W; 1135 m water depth). Leaching was performed\
    \ using a hydroxylamine hydrochloride solution to selectively dissolve the authigenic\
    \ Fe&ndash;Mn oxyhydroxide fraction, which records past seawater Nd isotope signatures.\
    \ Nd isotopes were determined by multi-collector inductively coupled plasma mass\
    \ spectrometry (MC-ICP-MS). The data are used to reconstruct changes in intermediate\
    \ water mass provenance in the North Atlantic across glacial&ndash;interglacial\
    \ cycles and to investigate the role of ice-sheet dynamics in driving these shifts.\n\
    Keywords: neodymium isotopes, authigenic Fe&ndash;Mn oxyhydroxide, ODP Site 982,\
    \ North Atlantic, paleoceanography, glacial&ndash;interglacial\n&nbsp;\nTable\
    \ 2\nTitle: Particulate neodymium isotope compositions in bulk sediment from ODP\
    \ Site 982, North Atlantic\nAbstract: Neodymium isotope compositions (143Nd/144Nd,\
    \ &epsilon;Nd) were measured on the detrital (particulate) fraction of bulk sediments\
    \ from ODP Site 982 (Rockall Plateau, North Atlantic; 57&deg;30.992N, 15&deg;52.001W;\
    \ 1135 m water depth). Samples were processed to remove the authigenic and carbonate\
    \ components prior to total digestion of the residual detrital phase. Nd isotopes\
    \ were determined by multi-collector inductively coupled plasma mass spectrometry\
    \ (MC-ICP-MS). The detrital &epsilon;Nd&nbsp;data serve to characterize the provenance\
    \ of terrigenous material delivered to the site and to assess potential detrital\
    \ contamination of the authigenic leachate signal.\nKeywords: neodymium isotopes,\
    \ detrital, sediment provenance, ODP Site 982, North Atlantic, paleoceanography\n\
    &nbsp;\nTable 3\nTitle: Major and rare earth element concentrations of Fe&ndash;Mn\
    \ oxyhydroxide leachates from ODP Site 982, North Atlantic\nAbstract: Concentrations\
    \ of major elements (Al, P, Ca, Mn, Fe) and rare earth elements (Y, La&ndash;Lu)\
    \ were measured in Fe&ndash;Mn oxyhydroxide leachates extracted from bulk sediments\
    \ at ODP Site 982 (Rockall Plateau, North Atlantic; 57&deg;30.992N, 15&deg;52.001W;\
    \ 1135 m water depth). Leaching was performed using a hydroxylamine hydrochloride\
    \ procedure targeting the authigenic Fe&ndash;Mn oxyhydroxide phase. Elemental\
    \ concentrations were determined by inductively coupled plasma mass spectrometry\
    \ (ICP-MS, iCAP). These data are used to evaluate the selectivity of the leaching\
    \ procedure (e.g., via Al/Nd ratios as indicators of detrital contamination),\
    \ to examine REE patterns and to support the interpretation of the corresponding\
    \ authigenic &epsilon;Nd&nbsp;record.\nKeywords: rare earth elements, major elements,\
    \ Fe&ndash;Mn oxyhydroxide, leachate geochemistry, ODP Site 982, North Atlantic\n\
    &nbsp;\nTable 4\nTitle: Neodymium isotope compositions of secondary standard solution\
    \ and reference materials for external reproducibility assessment\nAbstract: Neodymium\
    \ isotope compositions (143Nd/144Nd, &epsilon;Nd) of secondary standard solutions\
    \ and reference materials were measured alongside samples to monitor the external\
    \ reproducibility of Nd isotope analyses. Measurements were performed by multi-collector\
    \ inductively coupled plasma mass spectrometry (MC-ICP-MS). The data document\
    \ the long-term analytical precision and accuracy of the Nd isotope measurements\
    \ reported in this study.\nKeywords: neodymium isotopes, analytical reproducibility,\
    \ reference materials, quality control, MC-ICP-MS\n&nbsp;\nForward mixing model\
    \ python code&nbsp;Description:The Python code implementing the forward mixing\
    \ model with Monte Carlo uncertainty propagation used in Xu et al. (2026), published\
    \ in Science Advances. The model reconstructs glacial&ndash;interglacial shifts\
    \ in seawater neodymium isotope compositions (&epsilon;Nd) at ODP Site 982 (Rockall\
    \ Plateau, North Atlantic) by projecting ice-volume changes from the LR04 benthic\
    \ &delta;&sup1;\u2078O stack through a two-endmember mixing framework (Icelandic\
    \ vs. background North Atlantic sources), with a dual-period modulation scheme\
    \ calibrated to the Last Glacial Maximum."
