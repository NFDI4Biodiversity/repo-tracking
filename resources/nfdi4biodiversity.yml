  description: 'Bild- und Videodaten sind eine wichtige Grundlage f&uuml;r die Biodiversit&auml;tsforschung.
    Diese Daten werden prim&auml;r mittels Bild- und Videoannotation ausgewertet,
    also dem Markieren und Beschreiben von Objekten in den Bildern und Videos. Die
    Auswertung gro&szlig;er Bild- und Videodatens&auml;tze erfordert sehr viel Zeit.
    Daher ist spezielle Software besonders wichtig, um bei dieser Aufgabe zu unterst&uuml;tzen.


    BIIGLE ist eine web-basierte Software zur Bild- und Videoannotation. Sie erm&ouml;glicht
    kollaboratives Arbeiten auf gro&szlig;en Bild- und Videodatens&auml;tzen. Neben
    Werkzeugen zur manuellen und computergest&uuml;tzten Annotation bietet BIIGLE
    auch M&ouml;glichkeiten zur Qualit&auml;tskontrolle oder der Erstellung von eigenen
    Taxonomien zur Beschreibung von Objekten. BIIGLE wird von Forschenden aus der
    ganzen Welt akzeptiert und genutzt.


    Auch wenn BIIGLE bereits viele Funktionen beinhaltet, gibt es noch ein gro&szlig;es
    Entwicklungspotenzial, auch im Hinblick auf eine Eingliederung in NFDI4Biodiversity.
    So k&ouml;nnen Workshops angeboten werden, um die Sichtbarkeit von BIIGLE in der
    Community zu erh&ouml;hen. Weiterhin kann BIIGLE durch die Unterst&uuml;tzung
    von Single-Sign-On und Core Storage in die Research Data Commons integriert werden.


    BIIGLE ist Open Source Software. Eine &ouml;ffentliche BIIGLE-Instanz wird &uuml;ber
    die de.NBI Cloud an der Universit&auml;t Bielefeld betrieben und kann von Forschenden
    kostenlos genutzt werden.'
  license: cc-by-4.0
  name: "BIIGLE: Bild- und Videoannotation f\xFCr die Biodiversit\xE4tsforschung"
