  description: 'Bioschemas profiles for data types establish comprehensive guidelines
    that categorize properties into three distinct levels of implementation requirements:
    Compulsory elements that must contain information, recommended properties that
    should ideally be included, and optional attributes that may be added based on
    specific use cases or data availability.

    Table 1 presents all mandatory Bioschemas elements of its Dataset type alongside
    their assigned values within the current mapping version or their equivalent ABCD
    2.06 counterparts. These ABCD 2.06 elements are represented using XPath notation.
    Notably, the comprehensive mapping demonstrates that all mandatory Bioschemas
    elements can be successfully addressed through direct mappings from the ABCD 2.06
    standard.

    The second table shows recommended properties that should ideally contain information
    about a Dataset but are not strictly required, particularly in situations where
    such information may be unavailable or inappropriate. The mapping analysis reveals
    that the vast majority of recommended Bioschemas elements can be accommodated,
    with only three specific elements (alternateName, includedInDataCatalog, and isBasedOn)
    remaining uncovered by the current mapping approach.

    The final table identifies ABCD elements that cannot be adequately mapped to Bioschemas
    properties, detailing their sub-elements such as Text or URI in the second column.
    The accompanying notes column provides detailed explanations regarding the necessity
    and relevance of these mappings within the context of dataset search use cases.
    It was found that only two elements have a potential benefit that might be considered
    relevant for dataset search applications, though this benefit remains limited
    and somewhat ambiguous.'
