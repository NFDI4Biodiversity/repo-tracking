  description: 'Microscopy has been a cornerstone of biological research for centuries.
    However, while technological advancements have made microscopy increasingly quantitative,
    the analytical approaches used by many researchers still often lack reproducibility.

    In tandem with these technological advances, the role of the &ldquo;bioimage analyst&rdquo;
    has emerged. Often associated with microscopy core facilities, these experts possess
    the unique combination of skills and knowledge to optimise computational analyses
    of microscopy images. At the Francis Crick Institute, our team endeavours to do
    this primarily via training and method/workflow development, adhering to FAIR
    principles wherever possible.

    However, the barriers to fully implementing FAIR workflows in bioimaging remain
    significant. Many bio researchers lack computational skills and require extensive
    training and support to implement reproducible pipelines to analyse their own
    data. The data itself can be challenging, even for seasoned analysts, as microscopy
    file formats are many and varied, despite much progress on standardisation from
    groups such as the Open Microscopy Environment. Furthermore, modern microscopy
    systems allow the routine acquisition of large, complex, multi-dimensional datasets,
    requiring substantial computational resources to analyse, which many researchers
    do not have access to. These are not Crick-specific challenges - they are systemic
    across the life sciences and represent an area where programmes like BioFAIR could
    have a transformative impact.

    Here we present an overview of our efforts to tackle these challenges. These include
    the development of open-source analysis workflows, training programmes aimed at
    building computational literacy among bench scientists, and community-building
    initiatives to connect knowledge silos distributed around the UK and beyond.'
  license: cc-by-4.0
  name: Promoting open and reproducible workflows for bioimage analysis
