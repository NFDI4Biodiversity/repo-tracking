  description: Data on Kubernetes and stateful applications have gained remarkable
    adoption across the community. But why stop there? Kubernetes and cloud-native
    tools can provide compelling core technologies for building sophisticated data
    ecosystems, from advanced metadata handling to workflows and events. Enter the
    realm of "dataspaces," a transformative concept empowering organizations to seamlessly
    integrate and synchronize data sharing patterns for diverse existing data landscapes,
    that can even extend across organizational boundaries. Our session will give practical
