  description: "Die &bdquo;NFDI4Biodiversity All Hands Conference&ldquo; ist die j&auml;hrlich\
    \ stattfindende zentrale Veranstaltung f&uuml;r alle Mitarbeitenden des NFDI4Biodiversity\
    \ Konsortiums und eingeladene Interessierte. Sie fand 2024 vom 24. bis 26. April\
    \ in den R&auml;umlichkeiten der Generaldirektion der Staatlichen Archive Bayerns\
    \ in M&uuml;nchen statt (https://nfdi4biodiversity.org/de/events/all-hands-conference-2024/).\
    \ Als Konferenzvorprogramm gab es ein Vernetzungstreffen f&uuml;r Angeh&ouml;rige\
    \ Bayerischer Beh&ouml;rden und amtlicher Stellen im Umfeld der Staatlichen Archive.\n\
    Der Vortrag &bdquo;Neue Wege zur FAIRen Archivierung von digitalen Forschungsdaten\
    \ aus Bayern&ldquo; wurde in diesem Rahmen gehalten. Er beschreibt eine seit 2022\
    \ bestehende Kooperation zweier NFDI4Biodiversity-Partner aus Bayern: Die Staatlichen\
    \ Naturwissenschaftlichen Sammlungen Bayerns (SNSB) und die Generaldirektion der\
    \ Staatlichen Archive Bayerns (GDA). Zun&auml;chst werden die sich erg&auml;nzenden\
    \ Aufgaben der beiden Fachorganisationen beschrieben, wobei auf die unterschiedlichen\
    \ Archivalien und auf die Bedeutung, den Umfang und das Alter der naturhistorischen\
    \ Forschungssammlungen in Bayern, speziell f&uuml;r den Bereich Biodiversit&auml;tsforschung,\
    \ hingewiesen wird.&nbsp;\nDie laufende Zusammenarbeit besteht zwischen Mitarbeitenden\
    \ des Data Centers bzw. der Biodiversit&auml;tsinformatik-Abteilung der SNSB und\
    \ dem digitalen Archiv der GDA. Ziel ist die regelm&auml;&szlig;ige Archivierung\
    \ der SNSB-Sammlungsdatenbest&auml;nde, wie sie im in-house Datenbanksystem der\
    \ Diversity Workbench (DWB; www.diversityworkbench.net) gemanagt werden. Dies\
    \ soll anhand des SIARD-Standards und im SIARD-Datenformat geschehen. Entsprechende\
    \ Datenfl&uuml;sse, die von der GDA akzeptierte Abgabestruktur f&uuml;r ein SIARD-Datenpaket\
    \ sowie die Implementierung f&uuml;r einen ausgew&auml;hlten Datenbestand aus\
    \ dem Pilzherbarium der SNSB werden vorgestellt. \nDie Kooperation soll in der\
    \ laufenden Phase sowie Phase 2 von NFDI4Biodiversity fortgesetzt werden, um weitere\
    \ DWB-Datenbest&auml;nde aus verschiedenen Forschungssammlungen (Fossilien, Tiere)\
    \ zu archivieren und den SIARD-Ansatz auch auf andere relationale Datenbanksysteme\
    \ auszuweiten. &Uuml;ber die etablierten Netzwerke und Zugriffsportale der staatlichen\
    \ Archive in Deutschland k&ouml;nnen dann auch ansonsten nicht ver&ouml;ffentliche\
    \ sensible Bereiche der archivierten Daten (gesch&uuml;tzt durch Personenrecht,\
    \ Umweltrecht etc.) unter eingeschr&auml;nkten Zugriffsrechten (pseudo-) anonymisiert\
    \ bereitgestellt werden."
