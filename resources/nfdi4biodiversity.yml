  description: '

    The article describes an unusual color morph of the dice snake (Natrix tessellata
    var. flavescens) at Vrana Lake in Croatia. This variant displays a yellowish base
    coloration, intense black speckling, and red eyes and tongue. Based on personal
    field-herpetological observations and photographic documentation, the distribution,
    morphology, and possible genetic stability of this form are discussed. In addition,
    historical descriptions and taxonomic classifications from the scientific literature
    are referenced to trace the development of knowledge regarding the &ldquo;flavescens&rdquo;
    color morph. The contribution highlights the herpetological significance of the
    habitat and points to open questions concerning genetics and species conservation.


    Originally published in TERRARIA/elaphe 66 (2017) in German (ISSN 2363-9474).
    This version serves the purpose of digital archiving and free accessibility for
    scientific and natural history audiences. The original article is available on
    Zenodo under DOI: 10.5281/zenodo.17410521.


    '
