  description: 'Langzeitarchivierung (LZA) zielt darauf ab, Daten- und Informationsverlust
    zu vermeiden und nachhaltigen Zugriff zu Informationen zu erm&ouml;glichen. Fehlende
    oder nicht korrekt durchgef&uuml;hrte LZA kann Daten einer Vielzahl von Risiken
    aussetzen.

    Datenbest&auml;nde im deutschen Wissenschaftssystem sind in dieser Hinsicht gef&auml;hrdet,
    was dazu f&uuml;hrt, dass Langzeitarchivierung als eine zentrale Aufgabe der Nationalen
    Forschungsdateninfrastruktur e. V. (NFDI) deklariert wurde. Allerdings sind weiterhin
    viele Aspekte unklar, wie die Strategie und Ausrichtung von LZA in den Wissenschaftsdisziplinen,
    der Status der Implementierung und die Abdeckung durch LZA-Services in der NFDI.
    Um diese Punkte zu kl&auml;ren hat die NFDI Arbeitsgruppe Long Term Archiving
    der Sektion Common Infrastructures eine Umfrage in den Konsortien gestartet. Das
    Ziel war, den gegenw&auml;rtigen Status von LZA zu ermitteln und entsprechende
    Bedarfe zu ermitteln.

    Die Umfrage ergab als zentrale Aussage, dass der Bedarf an Beratung zum Thema
    LZA gro&szlig; ist:&nbsp; Viele Konsortien und Forschungsorganisationen haben
    sich bis jetzt nicht ausreichend mit L&ouml;sungen zum langfristigen Erhalt von
    Daten bzw. LZA befasst. Wenn LZA &uuml;berhaupt ein Thema war, wurde oft allein
    der Erhalt auf dem Bitstream Level anvisiert. Generell wurden Wissensl&uuml;cken
    in verschiedenen Bereichen deutlich. Als Konsequenz erscheint es sinnvoll, &nbsp;einen
    LZA-Beratungsservice aufzubauen, der sowohl die NFDI-Konsortien als auch Institutionen
    hinsichtlich Langzeitarchivierung von Forschungsdaten ber&auml;t. In der Umfrage
    haben die meisten Konsortien au&szlig;erdem einen Bedarf an zielgerichteten LZA-L&ouml;sungen
    ge&auml;u&szlig;ert, der auf die spezifischen Forschungscommunities und dort etablierte
    L&ouml;sungen ausgerichtet ist. LZA L&ouml;sungen sollten daher in Kooperation
    mit den Konsortien, deren Fachdisziplin einerseits und der internationalen LZA-Community
    andererseits verfolgt werden und sollten sich nach gemeinsam entwickelten Prinzipien,
    Richtlinien und Standards richten. Nicht zuletzt wurde in den Antworten auf die
    Umfrage deutlich, dass vor allem eine bessere und langfristige finanzielle Unterst&uuml;tzung
    der Konsortien und von Institutionen bez&uuml;glich LZA-Aufgaben entsprechend
    der FAIR Prinzipien n&ouml;tig ist und dass die Zertifizierung von Forschungsdatenservices
    dringend anzustreben ist.'
