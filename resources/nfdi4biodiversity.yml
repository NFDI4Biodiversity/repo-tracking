  description: "Interaction between the Earth's magnetic field and the Bz component\
    \ of the interplanetary magnetic field (IMF), which is the Sun's magnetic field\
    \ extended into space, causes geomagnetic storms, which are disturbances in the\
    \ ionosphere (upper atmosphere) and magnetic field of the Earth. The Equatorial\
    \ Electrojet (EEJ) is a strong eastward daytime electric current flowing in the\
    \ E\u2010region of the ionosphere, near the magnetic equator. The EEJ is mainly\
    \ affected by factors such as local solar time (LST), longitude, geomagnetic field,\
    \ seasonal variations, and solar activity. In this paper we examine the relationship\
    \ between the IMF Bz component and EEJ fluctuations across Atlantic, Asian, and\
    \ South American sectors during the geomagnetic storms of March and April 2023\
    \ and October 2024 by applying cross\u2010correlation analysis and continuous\
    \ wavelet transform (CWT). The results show that the EEJ exhibited strong fluctuations\
    \ during all three storms, showing longitudinal and local time dependency. IMF\
    \ Bz shows correlation with EEJ in the range of 0.6&ndash;0.9; the CWT analysis\
    \ shows well\u2010defined periodicities mainly at 2&ndash;4 hr and 4&ndash;8 hr.&nbsp;"
  name: Investigation of Geomagnetic Field and Equatorial Electrojet Variations Using
    Data from Low- and Mid-Latitude Stations During the Solar Storms of March and
    April 2023, and October 2024
