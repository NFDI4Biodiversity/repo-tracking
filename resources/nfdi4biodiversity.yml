    Research Data Infrastructures. Developed in collaboration between several partners
    within NFDI4Biodiversity, the SSU offers essential domain-specific knowledge in
    research data management.&nbsp;

    Prerequisites: No previous knowledge is required for this module. The chapters
    build on each other thematically, but can also be worked through individually.
    If information from other chapters is needed, they are linked.

    Target audience: students at PhD-level and beyond and researchers in the field
    of biology and environmental sciences, especially those working with biodiversity
    data, who are looking for a first introduction to research data management.

