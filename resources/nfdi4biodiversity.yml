  description: 'Human induced global change in combination with loss of biodiversity
    are the main threats mankind is facing these days. To determine management options
    and devise conservation responses, research on the status, trends and drivers
    of biodiversity is key. To analyse the state of biodiversity and its drivers properly
    comprehensive data across time, space, taxa and ecosystems is urgently needed.
    NFDI4Biodiversity&rsquo;s aim is to provide domain stakeholders with the know-how,
    tools and services they need in order to share, find and access data following
    the FAIR data principles.

    In the first funding phase, NFDI4Biodiversity has become ''the'' relevant hub
    for biodiversity research data and tools by cultivating collaborations between
    several data- and method-oriented communities in Germany and beyond. It has successfully
    raised awareness for data management in the community and fostered an appreciation
    of existing tools and solutions among stakeholders, as the growing number of use
    cases shows. The consortium has significantly grown its data and service provider
    network, bringing together previously unconnected initiatives within and outside
    the traditional academic sphere. Stakeholders show a high interest in collaborating,
    as indicated by more than two dozen requests to collaborate in third-party projects.
    The consortium is a prominent figure in the NFDI ecosystem, serving as a role
    model and driving joint infrastructure developments towards oneNFDI.

    In the second funding phase, we aim for scalability by consolidation and a broader
    dissemination of good practices. This will be archived through our nine key objectives:
    1. Stakeholder engagement: To enable biodiversity subcommunities to advance their
    research data management practices in a self-organised manner. 2. Training and
    education: To provide a scalable, needs-based training programme for the biodiversity
    community, in high synergy with related NFDI consortia and RDM initiatives. 3.
    User support: To offer a central point of contact and individual user support,
    backed by a strong Helpdesk and expert network across consortia and RDM initiatives.
    4. International partnerships: To foster robust partnerships with key initiatives
    and services in the international community. 5. Data Center network: To enhance
    their capabilities of serving the community including long-term data archiving.
    6. Portfolio management: To establish and maintain a community service portfolio
    and catalogue with shared responsibilities. 7. Data and service integration: To
    implement harmonised, community-driven workflows and services. 8. Research Data
    Commons platform: To provide and maintain core functions and self-service capabilities
    for data and service providers in the shared cloud infrastructure and 9. Integration
    with NFDI and sustainability: To align activities for the biodiversity community
    with the greater NFDI and large domain stakeholders over time. These objectives
    are implemented by the NFDI4Biodiversity work programme and its five task areas.

    --

    Added as an addendum is the&nbsp;Adapted Work Programme, which was adopted by
    the NFDI4Biodiversity Steering Committee in February 2026 after the approved funding
    was approximately 30 percent less than the amount originally requested.'
