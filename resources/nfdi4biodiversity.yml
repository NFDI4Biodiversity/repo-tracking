  - Fichtmueller, David
  description: 'This table systematically documents how elements of the ABCD 2.06
    vocabulary for biodiversity datasets are translated into Bioschemas (and schema.org)
    properties and types to support NFDI4Biodiversity''s aim of FAIRifying biodiversity
    data and beyond.&nbsp;

    Structure

    Each row corresponds to one ABCD element - organized by functional "Element Group"
    - and shows:


    ABCD 2.06 Element: XML path for that element in the ABCD schema

    Element URI: Uniform Resource Identifier for that ABCD element

    Bioschemas/schema.org Property: equivalent schema.org or Bioschemas property

    Bioschemas/schema.org (Data)Types: expected types for that property (e.g., Text,
    URL, Person, BioSample, Taxon, GeoCoordinates)

    Description: concise explanation of the element''s meaning

    Mapping Notes: implementation guidance


    Purpose

    In essence, the mapping table translates ABCD 2.06 into schema.org/Bioschemas
    markup to enhance dataset discoverability. For this, it maps ABCD:Dataset-level
    information to Bioschemas:Dataset properties while simultaneously aggregating
    and summarizing ABCD:Unit-level specimen data in a reasonable way. This structured
    metadata approach enables search platforms - including NFDI4Biodiversity''s consortium-wide
    discovery infrastructure and Google Dataset Search - to effectively index, retrieve,
    and present biodiversity datasets to researchers and practitioners seeking relevant
    data for their work.'
