  description: 'Butterfly Monitoring Germany -&nbsp;Based on the modular BioMe - infrastructure
    for biodiversity monitoring projects

    Butterfly Monitoring Germany (Tagfalter-Monitoring Deutschland / TMD) is a citizen
    science project to assess the status and trends of butterfly populations in Germany.
    The data collected is used to analyse the impacts of environmental change such
    as habitat loss and climate change, to support evidence-based conservation, and
    to inform decision makers and the general public about the state of biodiversity.
    Citizen science programs like TMD are also used in other fields, e.g. the monitoring
    of other insect groups, small watercourses and streams, or certain vertebrate
    species.&nbsp;

    The TMD apps and BioMe&nbsp;

    Programmes for biodiversity monitoring require complex infrastructures to collect,
    manage and prepare the data for various purposes. The TMD project is the first
    use case using the BioMe framework. The project aimes to provide a framework and
    infrastructure to implement applications for data collection and data curation
    in the context of biodiversity monitoring initiatives. This primarily addresses
    species or environmental status monitoring, but also data management, in particular
    the data quality workflow and data visualisation. For this purpose, BioMe supports
    data integration and synthesis for cross-thematic/interdisciplinary networking
    as a prerequisite for data products and further analyses. The role/rights-based
    data access and options for aggregated data preparation and its visualisation
    in diagrams or maps contribute to knowledge transfer and facilitate the involvement
    of strategic stakeholders.&nbsp;

    Requirements for the technical platform&nbsp;


    Focused on science - modular approach with reusable components for content-driven
    requirements of scientific communities within the scope of monitoring projects
    and field trails/data collection projects&nbsp;

    Open and FAIR by design providing data and metadata based on community proven
    standards using open interfaces

    Flexible and location independent through support of mobile apps

    Support for data collection through the use of AI


    Technical Features&nbsp;


    Future proof modular technical stack built on open source products

    Integrated into a portable container microservice architecture&nbsp;

    Identity and access management supporting Helmholtz AAI&nbsp;&nbsp;

    Customized, encapsulated web application based on project specific adaptable packages&nbsp;

    Project specific database&nbsp;

    Additional project independent databases&nbsp;&nbsp;


    trait/taxonomic database (project taxonomic concept)&nbsp;

    geo/spatial database&nbsp;



    Role-based communication between databases front and backend based on respective
    APIs (data views can be managed based on roles)

    Cloud based asset management and object storage based on S3 technology&nbsp;



    Modular construction toolbox for content related components&nbsp;

    BioMe pursues the most generic, modular approach possible in order to fulfil a
    wide range of requirements in various projects. This should enable simple deployment
    for other projects and enable&nbsp; integration into the local it infrastructure.



    &nbsp;Table 1: components of BioMe and their features&nbsp;






    Module



    Features






    user management&nbsp;






    Implements


    basic roles and permissions&nbsp;

    show and edit user data&nbsp;

    show user lists&nbsp;









    base layout






    Enables customization through&nbsp;


    project title&nbsp;

    colour scheme

    logo &amp; favicon&nbsp;&nbsp;

    navigation menu&nbsp;

    footer with links&nbsp;









    landing page&nbsp;






    &nbsp;


    Provides slots for


    presentation of project-specific content

    user-specific news feeds

    individual messages e.g. through the integrated quality assurance-system&nbsp;








    tables&nbsp;






    Generates and manages


    tables with specific configuration and settings &nbsp;

    user-specific visibility of columns&nbsp;







    filters




    Handles&nbsp;&nbsp;


    definition and management of individual queries

    services to load list of filters&nbsp;

    possibility to save and remove specific filterconfigurations&nbsp;







    &nbsp;publications

    &nbsp;The editorial module allows to



    manage categories&nbsp;



    create and edit e.g.


    news&nbsp;

