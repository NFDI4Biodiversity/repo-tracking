  description: Open Source Software licenses have a long history going back to the
    early 80s with the GNU Manifesto by Richard Stallman. In this talk, Uwe Schindler
    will give a short history of Open Source Software licenses and how they influenced
    licenses for sharing and publishing data. He will then present an overview about
    suitable licenses from the Creative Commons (CC) stack of licenses, while mentioning
    some of the licensing / copyright issues that may affect users and publishers
    in some legislatives. This talk will summarize the important aspects of copyright
    law with regards to &ldquo;scientific data&rdquo; and &ldquo;threshold of originality&rdquo;,
    and will explain how licensing works for newcomers of FAIR data publishing (but
