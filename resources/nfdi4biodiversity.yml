    transect specific habitat characteristics






    &nbsp;


    species catalogue&nbsp;




    &nbsp;Allows to visualize and manage


    taxonomic trees

    characteristics for taxonomic items like species or genus

    a search function within the taxonomic tree and catalogue





    &nbsp;


    species identification guide




    &nbsp;Provides


    dichotomous determination key for several species groups

    supports correct identification of species







    &nbsp;




    Additional project specific features for TMD&nbsp;



    Extended customization of the landing page based on widget system&nbsp;


    Most recent observations or images&nbsp;

    Several basic project statistics&nbsp;

    Most active users&nbsp;

    Individual diagram views&nbsp;



    Basic Webgis functionalities, e.g. geographical location of transects and species
    observation&nbsp;

    Diagram-based&nbsp;visualisation of the data&nbsp;

    Mobile app for TMD that uses the same backend. The mobile app has an offline mode
    that enables the data to be entered even without an internet connection. The app
    is available in the respective store for iOS free of charge&nbsp;


    https://apps.apple.com/de/app/tagfaltermonitoringdeutschland/&nbsp;







    The mobile App can be reused when using the same methodological approach as for
    butterfly monitoring but then has to be treated as a separate app that needs to
    be customised and further developed independently.

    Contact Information



    In case of any question please contact: biome@ufz.de.&nbsp;

    &nbsp;


    Techstack, dependencies and third party open source products&nbsp;


    Vue / Vuetify Vue.js - The Progressive JavaScript Framework | Vue.js (vuejs.org)&nbsp;

    Capacitor Capacitor by Ionic - Cross-platform apps with web technology (capacitorjs.com)&nbsp;

