  description: 'Transici&oacute;n Energ&eacute;tica, Patrimonio y Sustentabilidad
    re&uacute;ne las memorias acad&eacute;micas del Congreso Internacional sobre Desarrollo
    Sustentable y Transici&oacute;n Energ&eacute;tica: Preservaci&oacute;n del Patrimonio
    Natural y Cultural en la Pen&iacute;nsula de Yucat&aacute;n, celebrado en M&eacute;rida,
    Yucat&aacute;n, M&eacute;xico, los d&iacute;as 11, 12 y 13 de septiembre de 2024.

    La obra integra contribuciones interdisciplinarias orientadas al an&aacute;lisis
    de la sustentabilidad, la transici&oacute;n energ&eacute;tica, la gobernanza territorial,
    la preservaci&oacute;n del patrimonio natural y cultural, las energ&iacute;as
    renovables, el cambio clim&aacute;tico y los procesos comunitarios en contextos
    regionales y globales. Las memorias re&uacute;nen trabajos de especialistas, investigadores
    y profesionales provenientes de M&eacute;xico, Am&eacute;rica Latina, Europa y
    Estados Unidos.

    Los textos incluidos fueron objeto de revisi&oacute;n t&eacute;cnica y acad&eacute;mica
    por parte del Comit&eacute; Cient&iacute;fico y Editorial del Congreso, con el
    prop&oacute;sito de garantizar la calidad, coherencia y pertinencia de las contribuciones
    publicadas.

    Esta publicaci&oacute;n constituye un espacio de di&aacute;logo acad&eacute;mico
    internacional enfocado en la construcci&oacute;n de modelos de desarrollo sustentable
    socialmente incluyentes, territorialmente responsables y ambientalmente sostenibles
    para la Pen&iacute;nsula de Yucat&aacute;n y otras regiones del mundo.

    Energy Transition, Heritage and Sustainability brings together the academic proceedings
    of the International Congress on Sustainable Development and Energy Transition:
    Preservation of Natural and Cultural Heritage in the Yucat&aacute;n Peninsula,
    held in M&eacute;rida, Yucat&aacute;n, Mexico, on September 11&ndash;13, 2024.

    This volume compiles interdisciplinary contributions focused on sustainability,
    energy transition, territorial governance, preservation of natural and cultural
    heritage, renewable energy, climate change, and community-based processes in regional
    and global contexts. The proceedings include works by scholars, researchers, and
    professionals from Mexico, Latin America, Europe, and the United States.

    The texts included in this publication underwent technical and academic review
    by the Scientific and Editorial Committee of the Congress in order to ensure the
    quality, coherence, and relevance of the published contributions.

    This publication represents an international academic dialogue aimed at promoting
    socially inclusive, territorially responsible, and environmentally sustainable
    development models for the Yucat&aacute;n Peninsula and other regions of the world.'
