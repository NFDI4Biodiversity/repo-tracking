  description: 'Poster for the Fellowship of the Data - International RDM Community
    Meeting 2025&nbsp;

    Abstract:Effective data management is crucial for capturing and reusing research
    data, and a well-organized storage structure is essential for achieving this goal.
    Without a clear folder structure and a transparent filing system, data often becomes
    untraceable and difficult or impossible to locate. The poster addresses the role
    of good scientific practice and the FAIR criteria (Findable, Accessible, Interoperable,
    Reusable) in maintaining a well-organized digital workspace. Common problems that
    arise from poor data management will be discussed, along with strategies for avoiding
    them. The poster aims to provide a starting point for tidying up your digital
    workspace, and is relevant to researchers at all institutions, including the FBN
    in Dummerstorf, where they need to handle large amounts of data in their daily
    work.'
