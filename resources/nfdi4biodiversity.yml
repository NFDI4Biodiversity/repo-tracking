  description: 'Jeder Verwaltungsvorgang bei einer bayerischen &ouml;ffentlichen Stelle
    ist irgendwann abgeschlossen. Dann ist &uuml;ber die Archivierung &ndash; meist
    in einem&nbsp;staatlichen oder kommunalen Archiv &ndash; zu entscheiden. F&uuml;r
    die Archivierung sind allerdings auch datenschutzrechtliche Bestimmungen von Bedeutung.
    So kann Personen, die mit ihren Daten in dem Verwaltungsvorgang aufscheinen, ein
    Recht auf L&ouml;schung, mithin auf &bdquo;Vergessenwerden&ldquo; zustehen. Mitunter
    greift ein solches Recht sogar schon, wenn der Vorgang noch gar nicht zu archivieren
    ist. Sind personenbezogene Daten im Spiel, ist also eine Abstimmung zwischen Archiv-
    und Datenschutzrecht erforderlich.


    Den damit zusammenh&auml;ngenden Fragen widmet sich ein Arbeitspapier, das der
    Bayerische Landes-beauftragte f&uuml;r den Datenschutz als Datenschutz-Aufsichtsbeh&ouml;rde
    f&uuml;r den bayerischen &ouml;ffentlichen Sektor und die Generaldirektion der
    Staatlichen Archive Bayerns als zentrale staatliche Fachbeh&ouml;rde f&uuml;r
    alle Fragen des Archivwesens gemeinsam erarbeitet haben. Das Papier erl&auml;utert
    das Verh&auml;ltnis zwischen datenschutzrechtlicher L&ouml;schungs- und archivrechtlicher
    Anbietungspflicht. Es charakterisiert die Archivierung als L&ouml;schungssurrogat
    und geht &ndash; unter Ber&uuml;cksichtigung der je eigenen Perspektive von Datenschutz-
    und Archivrecht &ndash; auf die Frage der Aufbewahrungsdauer ein. Ferner kommt
    mit der vorzeitigen L&ouml;schung personenbezogener Daten im Einzelfall ein besonderes
    Problem des Verh&auml;ltnisses von Datenschutz- und Archivrecht zur Sprache. Schlie&szlig;lich
    werden die daten-schutzrechtlichen Informationspflichten bei der Archivierung
    von Unterlagen erl&auml;utert. Die Herausforderungen einer sich digitalisierenden
    Verwaltung sind dabei durchgehend ber&uuml;cksichtigt.'
  license: cc-by-4.0
