    We offer&nbsp;this course in different formats to facilitate accessibility and
    re-usability:



    LiaScript course (Markdown, available on GitHub): https://github.com/NFDI4Biodiversity/nfdi4biodiversity-sle



    OER section of Marburg University Ilias (LiaScript import, SCORM1.2, certificate
    for successful completion):&nbsp;https://ilias.uni-marburg.de/goto.php/crs/3219917



