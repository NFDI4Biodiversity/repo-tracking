  description: 'The southern German kingdom of W&uuml;rttemberg was administratively
    divided into districts, called "Ober&auml;mter" in German. Between 1824 and 1886,
    the royal statistical office published one regional study on each of the districts,
    including text descriptions of the local fauna.

    The CSV data represent all species documented in these sources, with the follwing
    information for each mention:



    district: Name of the district in which the species was mentioned.



    year: Year of publication of the source text.



    original_text: Excerpt from the text in which the species is mentioned.



    german_name: German name of the animal as given in the text. May be empty if a
    scientific name is provided.



    scientific_name: Scientific name of the animal as given in the text. May be empty
    if a German name is provided.



    reported_occurrence: Interpretation of whether the source text describes the species
    as occurring in the district. False indicates the species is explicitly reported
    as absent; True is assumed when False is not set. This column reflects the content
    of the historical text and does not imply biological presence of a species.



    normalized_name: Scientific name of the species as used by GBIF.



    GBIF_Id: Identifier assigned to the species by GBIF.



    &nbsp;'
