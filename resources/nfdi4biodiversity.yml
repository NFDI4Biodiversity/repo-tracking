    REST&nbsp;






    Available basic data:&nbsp;&nbsp;




    The plattform contains an extandable taxonomy backbone for the used target species
    groups



    This includes the taxonomy tree of the species with scientific names and the trivial
    synonyms



    Short descriptions of the species characteristics&nbsp;



    BioMe architecture

    The architecture of a BioMe usecase includes the frontend components, consisting
    of a web application and a mobile app. The backend structure consists of a project-specific
    API and database, as well as trait/taxonomy and geo API and databases shared across
    all BioMe projects.

    Acknowledgements

    &nbsp;RDM

    This project was made possible by the Research Data Management Team (RDM) at the
